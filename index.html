<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hackathon@welham</title>

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/base.css" />
    <link rel="stylesheet" href="CSS/layout.css" />
    <link rel="stylesheet" href="CSS/terminal.css" />
    <link rel="stylesheet" href="CSS/windows.css" />
    <link rel="stylesheet" href="CSS/animations.css" />
    <link rel="stylesheet" href="CSS/responsive.css" />
</head>
<body>

    <div class="terminal-wrapper">

        <!-- HEADER -->
        <div class="terminal-header">
            <div class="terminal-controls">
                <span class="control red"></span>
                <span class="control yellow"></span>
                <span class="control green"></span>
            </div>
            <div class="terminal-title">
                hackathon@welham — devtools sprint
            </div>
        </div>

        <!-- BODY -->
        <div class="terminal-body">

            <div class="terminal-grid">

                <!-- LEFT TERMINAL STREAM -->
                <div class="terminal-stream" id="terminalBody">

                    <!-- Boot -->
                    <section class="terminal-section" id="boot-section"></section>

                    <!-- Scroll sections (future use) -->
                    <section class="terminal-section" id="config-section"></section>
                    <section class="terminal-section" id="workshops-section"></section>
                    <section class="terminal-section" id="rules-section"></section>
                    <section class="terminal-section" id="mini-events-section"></section>
                    <section class="terminal-section" id="judging-section"></section>
                    <section class="terminal-section" id="timeline-section"></section>
                    <section class="terminal-section" id="registration-section"></section>

                </div>

                <!-- RIGHT SYSTEM STATUS -->
                <div class="terminal-status">

                    <div class="status-title">
                        SYSTEM STATUS
                    </div>

                    <div class="status-block">
mode: devtools
ai: disabled
git: enforced
duration: 36h
status: <span class="status-live">active</span>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <!-- Floating Window Container -->
    <div id="windowContainer"></div>

    <!-- JS -->
    <script type="module" src="JS/main.js"></script>

</body>
</html>
